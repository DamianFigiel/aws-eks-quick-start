apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beacon-data
  namespace: ethereum
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 100Gi
