apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: execution-client
  namespace: ethereum
  labels:
    app: execution-client
    component: ethereum
spec:
  serviceName: execution-client
  replicas: 1
  selector:
    matchLabels:
      app: execution-client
  template:
    metadata:
      labels:
        app: execution-client
        component: ethereum
    spec:
      nodeSelector:
        WorkloadType: ethereum
      tolerations:
      - key: "ethereum"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: execution-client
        image: ethereum/client-go:stable
        ports:
        - containerPort: 8545
          name: http-rpc
        - containerPort: 8546
          name: ws-rpc
        - containerPort: 30303
          name: p2p
          protocol: TCP
        - containerPort: 30303
          name: p2p-udp
          protocol: UDP
        - containerPort: 8551
          name: engine-api
        args:
        - --datadir=/data
        - --http
        - --http.addr=0.0.0.0
        - --http.port=8545
        - --http.api=eth,net,web3,engine,admin
        - --http.corsdomain=*
        - --ws
        - --ws.addr=0.0.0.0
        - --ws.port=8546
        - --ws.api=eth,net,web3
        - --ws.origins=*
        - --authrpc.addr=0.0.0.0
        - --authrpc.port=8551
        - --authrpc.jwtsecret=/secrets/jwt.hex
        - --syncmode=full
        - --gcmode=archive
        - --networkid=1
        - --port=30303
        - --discovery.port=30303
        - --nat=extip:0.0.0.0
        - --maxpeers=50
        volumeMounts:
        - name: el-data
          mountPath: /data
        - name: jwt-secret
          mountPath: /secrets
          readOnly: true
        resources:
          requests:
            memory: "8Gi"
            cpu: "2000m"
          limits:
            memory: "16Gi"
            cpu: "4000m"
      volumes:
      - name: jwt-secret
        secret:
          secretName: jwt-secret
  volumeClaimTemplates:
  - metadata:
      name: el-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 500Gi
---
apiVersion: v1
kind: Service
metadata:
  name: execution-client
  namespace: ethereum
  labels:
    app: execution-client
spec:
  selector:
    app: execution-client
  ports:
  - name: http-rpc
    port: 8545
    targetPort: 8545
  - name: ws-rpc
    port: 8546
    targetPort: 8546
  - name: engine-api
    port: 8551
    targetPort: 8551
  - name: p2p-tcp
    port: 30303
    targetPort: 30303
    protocol: TCP
  - name: p2p-udp
    port: 30303
    targetPort: 30303
    protocol: UDP
  type: ClusterIP