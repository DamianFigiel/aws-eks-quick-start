apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: op-geth
  namespace: rollup
  labels:
    app: op-geth
    component: rollup
spec:
  serviceName: op-geth
  replicas: 2
  selector:
    matchLabels:
      app: op-geth
  template:
    metadata:
      labels:
        app: op-geth
        component: rollup
    spec:
      containers:
      - name: op-geth
        image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth:latest
        ports:
        - containerPort: 8545
          name: http-rpc
        - containerPort: 8546
          name: ws-rpc
        - containerPort: 30303
          name: p2p
          protocol: TCP
        - containerPort: 30303
          name: p2p-udp
          protocol: UDP
        - containerPort: 8551
          name: engine-api
        args:
        - --datadir=/data
        - --http
        - --http.addr=0.0.0.0
        - --http.port=8545
        - --http.api=web3,debug,eth,txpool,net,engine
        - --http.corsdomain=*
        - --ws
        - --ws.addr=0.0.0.0
        - --ws.port=8546
        - --ws.api=debug,eth,txpool,net,engine
        - --ws.origins=*
        - --authrpc.addr=0.0.0.0
        - --authrpc.port=8551
        - --authrpc.jwtsecret=/secrets/jwt.hex
        - --rollup.disabletxpoolgossip=true
        - --rollup.sequencerhttp=http://op-node:8547
        - --rollup.historicalrpc=http://execution-client.ethereum.svc.cluster.local:8545
        - --networkid=10
        - --port=30303
        - --discovery.port=30303
        - --maxpeers=0
        - --nodiscover
        - --gcmode=archive
        - --syncmode=full
        volumeMounts:
        - name: op-geth-data
          mountPath: /data
        - name: jwt-secret
          mountPath: /secrets
          readOnly: true
        - name: rollup-config
          mountPath: /config
          readOnly: true
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "2000m"
      volumes:
      - name: jwt-secret
        secret:
          secretName: jwt-secret
      - name: rollup-config
        configMap:
          name: rollup-config
  volumeClaimTemplates:
  - metadata:
      name: op-geth-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 200Gi
---
apiVersion: v1
kind: Service
metadata:
  name: op-geth
  namespace: rollup
  labels:
    app: op-geth
spec:
  selector:
    app: op-geth
  ports:
  - name: http-rpc
    port: 8545
    targetPort: 8545
  - name: ws-rpc
    port: 8546
    targetPort: 8546
  - name: engine-api
    port: 8551
    targetPort: 8551
  - name: p2p-tcp
    port: 30303
    targetPort: 30303
    protocol: TCP
  - name: p2p-udp
    port: 30303
    targetPort: 30303
    protocol: UDP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: op-geth-external
  namespace: rollup
  labels:
    app: op-geth
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-internal: "false"
spec:
  selector:
    app: op-geth
  ports:
  - name: http-rpc
    port: 8545
    targetPort: 8545
  type: LoadBalancer