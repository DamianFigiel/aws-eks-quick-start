apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: op-node
  namespace: rollup
  labels:
    app: op-node
    component: rollup
spec:
  serviceName: op-node
  replicas: 2
  selector:
    matchLabels:
      app: op-node
  template:
    metadata:
      labels:
        app: op-node
        component: rollup
    spec:
      containers:
      - name: op-node
        image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:v1.14.1
        ports:
        - containerPort: 8547
          name: http-rpc
        - containerPort: 9003
          name: p2p
          protocol: TCP
        - containerPort: 9003
          name: p2p-udp
          protocol: UDP
        - containerPort: 7300
          name: metrics
        args:
        - --l2=http://op-geth:8551
        - --l2.jwt-secret=/secrets/jwt.hex
        - --rollup.config=/config/rollup.json
        - --rpc.addr=0.0.0.0
        - --rpc.port=8547
        - --p2p.listen.ip=0.0.0.0
        - --p2p.listen.tcp=9003
        - --p2p.listen.udp=9003
        - --metrics.enabled
        - --metrics.addr=0.0.0.0
        - --metrics.port=7300
        - --l1=http://execution-client.ethereum.svc.cluster.local:8545
        - --l1.rpckind=basic
        - --l1.beacon=http://beacon-chain.ethereum.svc.cluster.local:5052
        - --verifier.l1-confs=4
        - --log.level=info
        - --network=mainnet
        volumeMounts:
        - name: op-node-data
          mountPath: /data
        - name: jwt-secret
          mountPath: /secrets
          readOnly: true
        - name: rollup-config
          mountPath: /config
          readOnly: true
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "1000m"
      volumes:
      - name: jwt-secret
        secret:
          secretName: jwt-secret
      - name: rollup-config
        configMap:
          name: rollup-config
  volumeClaimTemplates:
  - metadata:
      name: op-node-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: op-node
  namespace: rollup
  labels:
    app: op-node
spec:
  selector:
    app: op-node
  ports:
  - name: http-rpc
    port: 8547
    targetPort: 8547
  - name: metrics
    port: 7300
    targetPort: 7300
  - name: p2p-tcp
    port: 9003
    targetPort: 9003
    protocol: TCP
  - name: p2p-udp
    port: 9003
    targetPort: 9003
    protocol: UDP
  type: ClusterIP