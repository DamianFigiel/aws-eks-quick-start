apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: beacon-chain
  namespace: ethereum
  labels:
    app: beacon-chain
    component: ethereum
spec:
  serviceName: beacon-chain
  replicas: 1
  selector:
    matchLabels:
      app: beacon-chain
  template:
    metadata:
      labels:
        app: beacon-chain
        component: ethereum
    spec:
      nodeSelector:
        WorkloadType: ethereum
      tolerations:
      - key: "ethereum"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: beacon-chain
        image: sigp/lighthouse:v7.0.1
        ports:
        - containerPort: 5052
          name: http-api
        - containerPort: 9000
          name: p2p-tcp
          protocol: TCP
        - containerPort: 9000
          name: p2p-udp
          protocol: UDP
        - containerPort: 5054
          name: metrics
        args:
        - lighthouse
        - beacon_node
        - --datadir=/data
        - --network=mainnet
        - --execution-endpoint=http://execution-client:8551
        - --execution-jwt=/secrets/jwt.hex
        - --http
        - --http-address=0.0.0.0
        - --http-port=5052
        - --metrics
        - --metrics-address=0.0.0.0
        - --metrics-port=5054
        - --disable-deposit-contract-sync
        - --checkpoint-sync-url=https://mainnet.checkpoint.sigp.io
        - --genesis-state-url=https://mainnet.checkpoint.sigp.io/genesis.ssz
        volumeMounts:
        - name: beacon-data
          mountPath: /data
        - name: jwt-secret
          mountPath: /secrets
          readOnly: true
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "2000m"
      volumes:
      - name: jwt-secret
        secret:
          secretName: jwt-secret
  volumeClaimTemplates:
  - metadata:
      name: beacon-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: beacon-chain
  namespace: ethereum
  labels:
    app: beacon-chain
spec:
  selector:
    app: beacon-chain
  ports:
  - name: http-api
    port: 5052
    targetPort: 5052
  - name: p2p-tcp
    port: 9000
    targetPort: 9000
    protocol: TCP
  - name: p2p-udp
    port: 9000
    targetPort: 9000
    protocol: UDP
  - name: metrics
    port: 5054
    targetPort: 5054
  type: ClusterIP